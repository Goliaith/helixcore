name: CI - Clean Source Install & Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package from source (no pre-built wheel)
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Smoke test core functionality (imports + Golden Paths + configure + status)
      run: |
        python -c "
        from helixcore import (
            begin_governed_work,
            pulse_agent_health,
            get_status_report,
            configure,
            is_standalone_mode,
            list_golden_paths,
        )
        print('✅ Imports successful')
        print('Standalone mode:', is_standalone_mode())
        print('Golden Paths:', [p['name'] for p in list_golden_paths()])

        # Test the new standalone-friendly status
        status = get_status_report(friendly=True)
        print('Status check: OK (standalone friendly)')

        # Quick governed task using the main entrypoint
        res = begin_governed_work('ci-test-task', 'Verify clean install from GitHub source', mode='light')
        print('begin_governed_work succeeded, keys:', list(res.keys())[:3])

        health = pulse_agent_health()
        print('Pulse active sessions:', health.get('active_session_count', 'N/A'))

        print('✅ All smoke tests passed for Python ${{ matrix.python-version }}')
        "

    - name: Test editable install as well
      run: |
        pip install -e .
        python -c "
        from helixcore import configure
        configure(home='/tmp/helixcore-ci-test')
        print('✅ Editable install also works cleanly')
        "

    - name: Run the external example script
      run: |
        python examples/simple_claude_dogfood.py
